# Full watch chain on a 6-hour cron: collect -> ingest -> dedup -> serve ->
# commit. The committed Parquet store + docs/data/feed.json are what the static
# dashboard (docs/) reads. watchcore is installed from git+https (see
# requirements.txt), NOT the local editable checkout — that path is local-dev
# only.
#
# Deployment is Vercel's, not this workflow's: Vercel's GitHub App webhook fires
# on any push to main — including the GITHUB_TOKEN commit below, independent of
# GitHub Actions' own push trigger — and rebuilds the static site from docs/.
# So this workflow just collects and commits; the push is what deploys.
name: OSINT Collect + Deploy

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write                 # same-repo push via GITHUB_TOKEN, no PAT

concurrency:
  group: collect                  # never let two collect runs race on the push
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true   # keep GITHUB_TOKEN creds so the push step works

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt   # watchcore[dedup,store] from git+https + collectors

      - name: Collect, store, dedup
        run: python ingest.py

      - name: Serve (write docs/data/feed.json from the store)
        run: python serve.py

      - name: Commit updated store + feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/ docs/data/feed.json          # scoped paths only, not the whole tree
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📡 watch $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
