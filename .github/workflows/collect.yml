# Full watch chain on a 6-hour cron: collect -> ingest -> dedup -> serve ->
# commit -> deploy. The committed Parquet store + docs/data/feed.json are what
# the static dashboard (docs/) reads. watchcore is installed from git+https (see
# requirements.txt), NOT the local editable checkout — that path is local-dev
# only.
#
# Pages is deployed *inside this run* (not via a push/workflow_run trigger): the
# commit step pushes with GITHUB_TOKEN, and a GITHUB_TOKEN push does not trigger
# deploy.yml's push event, so the cron's data commit would otherwise never go
# live. Deploying here keeps it self-contained, no PAT.
name: OSINT Collect + Deploy

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write                 # same-repo push via GITHUB_TOKEN, no PAT
  pages: write                    # deploy the refreshed docs/ to Pages
  id-token: write                 # OIDC for actions/deploy-pages

concurrency:
  group: collect                  # never let two collect runs race on the push
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true   # keep GITHUB_TOKEN creds so the push step works

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt   # watchcore[dedup,store] from git+https + collectors

      - name: Collect, store, dedup
        run: python ingest.py

      - name: Serve (write docs/data/feed.json from the store)
        run: python serve.py

      - name: Commit updated store + feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/ docs/data/feed.json          # scoped paths only, not the whole tree
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📡 watch $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # Deploy the docs/ produced by this run (fresh feed.json) straight to Pages.
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
